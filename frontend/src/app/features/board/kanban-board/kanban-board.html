<div class="board-header">
  <h2>Your Board</h2>
  
  <div class="header-actions">
    <mat-icon 
      class="info-tooltip-icon"
      matTooltip="• Doppelklick auf Spalte: neuer Task &#10;• Doppelklick auf Karte: Details/Edit"
      matTooltipClass="multi-line-tooltip">
      info_outline
    </mat-icon>

    <button mat-mini-fab color="primary" (click)="openColumnDialog()" matTooltip="Neue Spalte hinzufügen">
      <mat-icon>add</mat-icon>
    </button>
  </div>
</div>

<div class="board-layout" cdkDropListGroup>
  <app-kanban-column
    *ngFor="let col of sortedColumns"
    [title]="col.name"
    [canEdit]="!col.isSystem"
    [columnId]="col.id" 
    [tasks]="getTasksByColumn(col.id)" 
    (taskDropped)="handleTaskDrop($event, col.id)"
    (addTask)="openTaskDialog(undefined, col.id)"
    (editTask)="openTaskDialog($event)"
    (renameColumn)="openColumnDialog(col)">
  </app-kanban-column>
</div>
